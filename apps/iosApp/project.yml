# ADR 0044 Phase B — the iOS host that embeds the KMP :client static framework and shows
# MainViewController(). Generated with xcodegen (no CocoaPods in the repo). The static framework is
# LINKED (not embedded): OTHER_LDFLAGS `-framework client` + a per-SDK FRAMEWORK_SEARCH_PATHS. A
# pre-build script runs the gradle link task so the .framework exists before Xcode links it.
name: iosApp
options:
  bundleIdPrefix: com.sloopworks.dayfold
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: Sources
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Dayfold
        # Compose Multiplatform requires this on iOS or it aborts on first composition (high-refresh check).
        CADisableMinimumFrameDurationOnPhone: true
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSLocationWhenInUseUsageDescription: "Dayfold uses your location on this device to notice when you arrive at a saved place, so it can surface the right reminder. Your live location never leaves the device."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Dayfold matches your saved places in the background so a place reminder can reach you even when the app is closed. The matching happens on this device; your live location is never uploaded."
        UIBackgroundModes:
          - location
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - com.sloopworks.dayfold.now.refresh
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sloopworks.dayfold
        TARGETED_DEVICE_FAMILY: "1,2"
        # Simulator builds don't need signing; real-device signing is set up in S5 if available.
        CODE_SIGNING_ALLOWED: NO
        # Static KMP framework: link it, do NOT embed.
        OTHER_LDFLAGS:
          - $(inherited)
          - -framework
          - client
          - -lsqlite3   # touchlab/sqliter native driver links system sqlite3
        FRAMEWORK_SEARCH_PATHS[sdk=iphonesimulator*]:
          - $(SRCROOT)/../client/build/bin/iosSimulatorArm64/debugFramework
        FRAMEWORK_SEARCH_PATHS[sdk=iphoneos*]:
          - $(SRCROOT)/../client/build/bin/iosArm64/debugFramework
    preBuildScripts:
      - name: "Build Kotlin :client framework"
        basedOnDependencyAnalysis: false
        script: |
          set -e
          export JAVA_HOME=/opt/homebrew/opt/openjdk@17/libexec/openjdk.jdk/Contents/Home
          if [[ "$SDK_NAME" == iphonesimulator* ]]; then
            TASK=linkDebugFrameworkIosSimulatorArm64
          else
            TASK=linkDebugFrameworkIosArm64
          fi
          cd "$SRCROOT/.."
          ./gradlew :client:$TASK
          # Copy Compose Multiplatform resources (fonts/images) into the app bundle. Reads the Xcode
          # env (BUILT_PRODUCTS_DIR / CONTENTS_FOLDER_PATH / CONFIGURATION / ARCHS) → syncs into the .app.
          ./gradlew :client:syncComposeResourcesForIos
