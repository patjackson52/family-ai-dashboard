<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Figtree:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; }
  .msr { font-family: 'Material Symbols Rounded'; font-weight: normal; line-height: 1; white-space: nowrap; -webkit-font-smoothing: antialiased; }
  .msr.fill { font-variation-settings: 'FILL' 1; }
  .tld-scroll::-webkit-scrollbar { width: 0; height: 0; }
  @keyframes tld-now { 0%,100% { box-shadow: 0 0 0 0 rgba(192,56,30,0.0); } 50% { box-shadow: 0 0 0 4px rgba(192,56,30,0.26); } }
  @media (prefers-reduced-motion: reduce) { .tld-pulse { animation: none !important; } }
</style>
</helmet>
<div style="width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;background:{{ c.surface }};font-family:'Figtree',sans-serif;color:{{ c.onSurface }};">

  <!-- header -->
  <div style="background:{{ c.headerBg }};padding:14px 18px 16px;flex:0 0 auto;">
    <div style="display:flex;align-items:center;margin-bottom:13px;">
      <span onClick="{{ onBack }}" class="msr" style="font-size:23px;color:{{ c.onSurface }};cursor:pointer;">arrow_back</span>
    </div>
    <h1 style="font-family:'Outfit';font-weight:600;font-size:25px;letter-spacing:-0.015em;color:{{ c.onSurface }};margin:0 0 3px;line-height:1.1;">{{ title }}</h1>
    <div style="font-family:'Figtree';font-size:13.5px;color:{{ c.onSurfaceVar }};margin-bottom:14px;">{{ subtitle }}</div>

    <!-- scope toggle -->
    <div style="display:inline-flex;background:{{ c.surface }};border:1px solid {{ c.outlineVar }};border-radius:999px;padding:3px;gap:2px;">
      <span onClick="{{ setDay }}" style="display:inline-flex;align-items:center;gap:6px;font-family:'Figtree';font-size:12.5px;font-weight:600;padding:7px 14px;border-radius:999px;cursor:pointer;background:{{ dayPillBg }};color:{{ dayPillFg }};"><span class="msr" style="font-size:15px;">wb_sunny</span>This day</span>
      <span onClick="{{ setHub }}" style="display:inline-flex;align-items:center;gap:6px;font-family:'Figtree';font-size:12.5px;font-weight:600;padding:7px 14px;border-radius:999px;cursor:pointer;background:{{ hubPillBg }};color:{{ hubPillFg }};"><span class="msr" style="font-size:15px;">calendar_month</span>Whole hub</span>
    </div>
  </div>

  <!-- body -->
  <div class="tld-scroll" style="flex:1;overflow-y:auto;padding:18px 18px 24px;">
    <sc-for list="{{ feed }}" as="it" hint-placeholder-count="9">

      <!-- GROUP HEADER -->
      <sc-if value="{{ it.isGroup }}" hint-placeholder-val="{{ false }}">
        <div style="display:flex;align-items:center;gap:9px;margin:{{ it.gTop }} 2px 10px;">
          <span style="font-family:'Figtree';font-size:12px;font-weight:700;letter-spacing:0.07em;color:{{ it.gColor }};">{{ it.label }}</span>
          <span style="flex:1;height:1px;background:{{ c.outlineVar }};"></span>
          <sc-if value="{{ it.hasGSub }}" hint-placeholder-val="{{ false }}"><span style="font-family:'Figtree';font-size:11px;font-weight:500;color:{{ c.onSurfaceVar }};">{{ it.gSub }}</span></sc-if>
        </div>
      </sc-if>

      <!-- NOW LINE -->
      <sc-if value="{{ it.isNow }}" hint-placeholder-val="{{ false }}">
        <div style="display:flex;align-items:center;gap:10px;margin:2px 0 14px;padding-left:1px;">
          <span style="width:11px;height:11px;flex:0 0 11px;border-radius:999px;background:{{ c.primary }};box-shadow:0 0 0 4px {{ c.primaryHalo }};"></span>
          <span style="font-family:'Figtree';font-size:11px;font-weight:700;letter-spacing:0.06em;color:{{ c.onPrimary }};background:{{ c.primary }};border-radius:6px;padding:3px 8px;">NOW · {{ it.nowTime }}</span>
          <span style="flex:1;height:2px;border-radius:2px;background:linear-gradient(90deg,{{ c.primary }},transparent);"></span>
        </div>
      </sc-if>

      <!-- ENTRY -->
      <sc-if value="{{ it.isEntry }}" hint-placeholder-val="{{ true }}">
        <div style="display:flex;gap:14px;">
          <!-- rail -->
          <div style="display:flex;flex-direction:column;align-items:center;flex:0 0 16px;">
            <span class="{{ it.pulse }}" style="width:{{ it.dotSize }};height:{{ it.dotSize }};border-radius:999px;background:{{ it.dotBg }};border:{{ it.dotBorder }};display:flex;align-items:center;justify-content:center;margin-top:3px;"><span class="msr fill" style="font-size:{{ it.tickSize }};color:{{ it.tickFg }};">{{ it.tick }}</span></span>
            <span style="flex:1;width:2px;background:{{ it.lineColor }};margin:4px 0;{{ it.lineHide }}"></span>
          </div>
          <!-- content -->
          <div style="flex:1;min-width:0;padding-bottom:18px;">
            <div style="background:{{ it.cardBg }};border:{{ it.cardBorder }};border-radius:16px;padding:{{ it.pad }};">
              <div style="display:flex;align-items:baseline;justify-content:space-between;gap:10px;">
                <span style="font-family:'Outfit';font-weight:600;font-size:15px;color:{{ it.titleFg }};text-decoration:{{ it.strike }};line-height:1.2;">{{ it.title }}</span>
                <span style="font-family:'Figtree';font-size:12px;font-weight:600;color:{{ it.timeFg }};white-space:nowrap;flex:0 0 auto;">{{ it.time }}</span>
              </div>
              <sc-if value="{{ it.hasSub }}" hint-placeholder-val="{{ false }}"><div style="font-family:'Figtree';font-size:12.5px;line-height:1.45;color:{{ c.onSurfaceVar }};margin-top:4px;">{{ it.sub }}</div></sc-if>

              <sc-if value="{{ it.hasMeta }}" hint-placeholder-val="{{ false }}">
                <div style="display:flex;align-items:center;gap:11px;flex-wrap:wrap;margin-top:11px;">
                  <sc-if value="{{ it.hasSource }}" hint-placeholder-val="{{ false }}">
                    <span title="{{ it.srcTitle }}" style="display:inline-flex;align-items:center;gap:5px;font-family:'Figtree';font-size:11px;font-weight:500;color:{{ c.onSurfaceVar }};opacity:0.9;">
                      <span class="msr" style="font-size:13px;color:{{ c.outline }};">{{ it.srcIcon }}</span><span style="{{ it.srcLabelHide }}">{{ it.srcLabel }}</span>
                    </span>
                  </sc-if>
                  <sc-if value="{{ it.hasWho }}" hint-placeholder-val="{{ false }}">
                    <span style="display:inline-flex;align-items:center;gap:6px;font-family:'Figtree';font-size:11.5px;font-weight:500;color:{{ c.onSurfaceVar }};">
                      <span style="width:20px;height:20px;border-radius:999px;background:{{ it.whoBg }};color:{{ it.whoFg }};display:inline-flex;align-items:center;justify-content:center;font-family:'Outfit';font-weight:600;font-size:9.5px;">{{ it.whoInit }}</span>{{ it.who }}
                    </span>
                  </sc-if>
                  <sc-for list="{{ it.attach }}" as="a" hint-placeholder-count="2">
                    <span style="display:inline-flex;align-items:center;gap:5px;font-family:'Figtree';font-size:11.5px;font-weight:600;color:{{ a.fg }};background:{{ a.bg }};border-radius:8px;padding:5px 9px;"><span class="msr" style="font-size:14px;">{{ a.icon }}</span>{{ a.label }}</span>
                  </sc-for>
                </div>
              </sc-if>
            </div>
          </div>
        </div>
      </sc-if>

    </sc-for>

    <!-- provenance footnote (DERIVED — neutral, honest, not the purple authored treatment) -->
    <div style="display:flex;align-items:flex-start;gap:10px;margin:2px 2px 0;padding:14px 15px;background:transparent;border:1px solid {{ c.outlineVar }};border-radius:14px;">
      <span class="msr" style="font-size:17px;color:{{ c.outline }};margin-top:1px;">event</span>
      <div style="font-family:'Figtree';font-size:12px;line-height:1.5;color:{{ c.onSurfaceVar }};">{{ provNote }}</div>
    </div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:800},&quot;mode&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;light&quot;,&quot;dark&quot;],&quot;default&quot;:&quot;light&quot;,&quot;tsType&quot;:&quot;'light' | 'dark'&quot;},&quot;scale&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;day&quot;,&quot;hub&quot;],&quot;default&quot;:&quot;day&quot;,&quot;tsType&quot;:&quot;'day' | 'hub'&quot;},&quot;sourceDetail&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;minimal&quot;,&quot;label&quot;,&quot;verbose&quot;],&quot;default&quot;:&quot;label&quot;,&quot;tsType&quot;:&quot;'minimal' | 'label' | 'verbose'&quot;,&quot;section&quot;:&quot;Derived&quot;},&quot;onBack&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;}}">
class Component extends DCLogic {
  constructor(props) {
    super(props);
    this.state = { scope: props.scale === 'hub' ? 'hub' : 'day' };
  }
  renderVals() {
    const mode = this.props.mode === 'dark' ? 'dark' : 'light';
    const scope = this.state.scope;
    const light = {
      surface:'#FFF8F6', headerBg:'#FCEBE6', surfaceContainer:'#FCEBE6', surfaceContainerHigh:'#F6E5E0',
      onSurface:'#271814', onSurfaceVar:'#5A423C', outline:'#8C726B', outlineVar:'#EBD3CB',
      primary:'#C0381E', onPrimary:'#FFFFFF', primaryContainer:'#FFDAD2', onPrimaryContainer:'#5A1100', primaryTint:'#FBE0D9', primaryHalo:'rgba(192,56,30,0.22)',
      secondary:'#00796F', onSecondary:'#FFFFFF', secondaryContainer:'#9DF2E4', onSecondaryContainer:'#00201C',
      tertiary:'#6438AE', onTertiary:'#FFFFFF', tertiaryContainer:'#ECDCFF', onTertiaryContainer:'#23005C',
      provFg:'#4C2092', provBg:'#F4ECFB', provBorder:'#E0CDF5',
    };
    const dark = {
      surface:'#1A110E', headerBg:'#271D1A', surfaceContainer:'#271D1A', surfaceContainerHigh:'#322824',
      onSurface:'#F0DFDA', onSurfaceVar:'#D8C2BB', outline:'#A08D87', outlineVar:'#3D322E',
      primary:'#FFB4A3', onPrimary:'#5F1500', primaryContainer:'#9A2A12', onPrimaryContainer:'#FFDAD2', primaryTint:'#3A201A', primaryHalo:'rgba(255,180,163,0.24)',
      secondary:'#50DBC9', onSecondary:'#00382F', secondaryContainer:'#005048', onSecondaryContainer:'#A8F4E7',
      tertiary:'#D3BBFF', onTertiary:'#3A0080', tertiaryContainer:'#4C2092', onTertiaryContainer:'#ECDCFF',
      provFg:'#D3BBFF', provBg:'#2A1F3D', provBorder:'#4C2092',
    };
    const c = mode === 'dark' ? dark : light;

    const grp = (label, color, top, sub) => ({ isGroup:true, isNow:false, isEntry:false, label, gColor:color||c.onSurfaceVar, gTop:top||'0px', hasGSub:!!sub, gSub:sub||'' });
    const now = (t) => ({ isGroup:false, isNow:true, isEntry:false, nowTime:t });
    const A = (icon, label, kind) => ({ icon, label, kind: kind||'plain' });
    const entry = (o) => Object.assign({ isGroup:false, isNow:false, isEntry:true, sub:'', who:'', whoInit:'', attach:[], major:false, src:'' }, o);
    // how much per-stop provenance to show — the operator decides this (ADR 0046 dec.1)
    const detail = ['minimal','label','verbose'].includes(this.props.sourceDetail) ? this.props.sourceDetail : 'label';
    // each derived stop traces to a real dated block already in the hub
    const SRC = {
      checklist: { icon:'checklist',    short:'checklist', long:'from a checklist item' },
      pickup:    { icon:'location_on',  short:'pickup',    long:'from a pickup' },
      milestone: { icon:'flag',         short:'milestone', long:'from a milestone' },
      hubdate:   { icon:'event',        short:'hub date',  long:'from the hub’s dates' },
    };

    const att = (a) => {
      const k = a.kind;
      const map = {
        call:   { bg:c.secondaryContainer, fg:c.onSecondaryContainer },
        nav:    { bg:c.secondaryContainer, fg:c.onSecondaryContainer },
        file:   { bg:c.surfaceContainerHigh, fg:c.onSurfaceVar },
        link:   { bg:c.tertiaryContainer, fg:c.onTertiaryContainer },
        plain:  { bg:c.surfaceContainerHigh, fg:c.onSurfaceVar },
      };
      const t = map[k] || map.plain;
      return { icon:a.icon, label:a.label, bg:t.bg, fg:t.fg };
    };

    // ---------- DATA ----------
    const dayFeed = [
      grp('MORNING', c.onSurfaceVar, '0px'),
      entry({ kind:'done', title:'Car loaded', time:'7:30 AM', sub:'Boxes, mini-fridge, bedding', src:'checklist', attach:[A('checklist','Dorm list','link')] }),
      entry({ kind:'done', title:'Left home', time:'8:00 AM', sub:'Henderson Hall — about 2h drive', src:'checklist' }),
      entry({ kind:'done', title:'Checked in, keys collected', time:'9:50 AM', sub:'Move-in desk, Lot C', src:'pickup', attach:[A('map','Map','nav')] }),
      now('10:40'),
      entry({ kind:'next', title:'Elevator move-up slot', time:'11:00 AM', sub:'20-min window — grab the loading cart', src:'checklist', attach:[A('checklist','Move-in list','link')] }),
      entry({ kind:'up', title:'Lunch break', time:'12:30 PM', sub:'Campus dining hall', src:'checklist' }),
      grp('AFTERNOON', c.onSurfaceVar, '6px'),
      entry({ kind:'up', title:'Bookstore & student ID', time:'2:00 PM', sub:'Textbooks already on the list', src:'checklist', attach:[A('list_alt','Booklist','link')] }),
      entry({ kind:'up', title:'Family goodbye', time:'4:30 PM', sub:'Parking pass expires 5:00 PM', src:'checklist', attach:[A('local_parking','Parking','file')], last:true }),
    ];

    const hubFeed = [
      grp('MAY', c.onSurfaceVar, '0px'),
      entry({ kind:'done', title:'Enrollment deposit paid', time:'May 1', src:'milestone', attach:[A('description','Receipt','file')] }),
      grp('JUNE', c.onSurfaceVar, '6px'),
      entry({ kind:'done', title:'Housing application submitted', time:'Jun 12', src:'checklist' }),
      grp('JULY', c.onSurfaceVar, '6px'),
      entry({ kind:'done', title:'Orientation completed', time:'Jul 20', src:'milestone' }),
      entry({ kind:'done', title:'Financial aid confirmed', time:'Jul 28', src:'checklist', attach:[A('description','Aid letter','file')] }),
      grp('AUGUST', c.primary, '6px', 'this month'),
      now('Today · Aug 24'),
      entry({ kind:'major', title:'Move-in day', time:'Today', sub:'Henderson Hall, room 214 — the hub’s countdown target', src:'hubdate', attach:[A('checklist','Dorm list','link'),A('map','Map','nav')] }),
      entry({ kind:'up', title:'First day of classes', time:'Aug 28', sub:'Syllabus week begins', src:'hubdate' }),
      grp('SEPTEMBER', c.onSurfaceVar, '6px'),
      entry({ kind:'up', title:'Family weekend', time:'Sep 19', src:'milestone', last:true }),
    ];

    const src = scope === 'hub' ? hubFeed : dayFeed;
    // resolve styling per entry kind
    const feed = src.map((it) => {
      if (!it.isEntry) return it;
      const k = it.kind;
      const done = k === 'done', next = k === 'next', major = k === 'major';
      const dotBg = done ? c.secondary : next ? c.primary : major ? c.tertiary : 'transparent';
      const ringBorder = '2px solid ' + c.outline;
      return Object.assign({}, it, {
        dotSize: (next||major) ? '16px' : '13px',
        tickSize: (next||major) ? '11px' : '9px',
        dotBg,
        dotBorder: (done||next||major) ? 'none' : ringBorder,
        tick: done ? 'check' : major ? 'star' : next ? 'arrow_forward' : '',
        tickFg: done ? c.onSecondary : major ? c.onTertiary : c.onPrimary,
        pulse: next ? 'tld-pulse' : '',
        lineColor: done ? c.secondary : c.outlineVar,
        lineHide: it.last ? 'visibility:hidden;' : '',
        cardBg: major ? c.tertiaryContainer : next ? c.surfaceContainer : 'transparent',
        cardBorder: next ? ('1px solid ' + c.primary) : 'none',
        pad: (major||next) ? '13px 15px' : '1px 2px 0',
        titleFg: done ? c.onSurfaceVar : major ? c.onTertiaryContainer : c.onSurface,
        strike: 'none',
        timeFg: next ? c.primary : done ? c.onSurfaceVar : major ? c.onTertiaryContainer : c.onSurface,
        hasSub: !!it.sub,
        hasWho: !!it.who,
        whoBg: major ? c.tertiary : c.primaryContainer,
        whoFg: major ? c.onTertiary : c.onPrimaryContainer,
        hasSource: !!SRC[it.src],
        srcIcon: SRC[it.src] ? SRC[it.src].icon : '',
        srcLabel: SRC[it.src] ? (detail==='verbose' ? SRC[it.src].long : SRC[it.src].short) : '',
        srcLabelHide: detail==='minimal' ? 'display:none;' : '',
        srcTitle: SRC[it.src] ? SRC[it.src].long : '',
        hasMeta: !!it.who || (it.attach && it.attach.length > 0) || !!SRC[it.src],
        attach: (it.attach || []).map(att),
      });
    });

    return {
      c,
      onBack: this.props.onBack || (() => {}),
      setDay: () => this.setState({ scope:'day' }),
      setHub: () => this.setState({ scope:'hub' }),
      dayPillBg: scope==='day' ? c.primaryContainer : 'transparent',
      dayPillFg: scope==='day' ? c.onPrimaryContainer : c.onSurfaceVar,
      hubPillBg: scope==='hub' ? c.primaryContainer : 'transparent',
      hubPillFg: scope==='hub' ? c.onPrimaryContainer : c.onSurfaceVar,
      title: scope==='hub' ? 'Roadmap' : 'Move-in day',
      subtitle: scope==='hub' ? "Maya starts college · May–Sep" : "Maya starts college · Today, Aug 24",
      headChip: scope==='hub' ? 'Move-in is today' : 'now 10:40 AM',
      feed,
      provNote: scope==='hub'
        ? 'Nothing was authored here. This roadmap is laid out from dates already in the hub — milestones, checklist due-dates and the hub’s own dates — arranged on your device. It doesn’t notify; it just shows what’s already here, in time order.'
        : 'Nothing was authored here. This day is laid out from dates already in the hub — checklist due-times and a pickup — arranged on your device. It doesn’t notify; it just shows what’s already here, in time order.',
    };
  }
}
</script>
</body>
</html>
